name: Android APK Build and Cross-Repo Update

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Current Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Get Version Code
        id: get_version
        run: |
          VCODE=$(date +%s)
          echo "VCODE=$VCODE" >> $GITHUB_ENV

      - name: Create Release in Current Repo
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VCODE }}
          name: Shamim Live TV v2.1 (Build ${{ env.VCODE }})
          files: app/build/outputs/apk/debug/app-debug.apk
          body: "Automatic build of the latest version."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push update.json to Shamim-Live-TV-Update Repo
        env:
          MY_PAT: ${{ secrets.MY_PAT }}
        run: |
          # Configure Git
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # Clone the update repo
          git clone https://x-access-token:${MY_PAT}@github.com/shamimpipon/Shamim-Live-TV-Update.git update_repo
          cd update_repo
          
          # Create update.json with safe quotes
          echo '{
            "versionCode": '${{ env.VCODE }}',
            "apkUrl": "https://github.com/shamimpipon/Shamim-live-tv/releases/download/v${{ env.VCODE }}/app-debug.apk",
            "whatsNew": "Automatic bug fixes and performance improvements."
          }' > update.json
          
          # Commit and Push
          git add update.json
          git commit -m "Auto-update version to ${{ env.VCODE }}" || echo "No changes to commit"
          git push origin main || git push origin master
