name: Android APK Build and Release

on:
  push:
    branches:
      - master  # Changed from main to master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Get Version Code
        id: get_version
        run: |
          VCODE=$(date +%s)
          echo "VCODE=$VCODE" >> $GITHUB_ENV

      - name: Update Update.json
        run: |
          echo '{
            "versionCode": '${{ env.VCODE }}',
            "apkUrl": "https://github.com/${{ github.repository }}/releases/download/v${{ env.VCODE }}/app-debug.apk",
            "whatsNew": "New Premium UI and Auto-Update system."
          }' > update.json

      - name: Commit and Push update.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add update.json
          git commit -m "Auto-update version to ${{ env.VCODE }}" || echo "No changes to commit"
          git push

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VCODE }}
          name: Shamim Live TV v2.1 (Build ${{ env.VCODE }})
          files: app/build/outputs/apk/debug/app-debug.apk
          body: "Automatic build of the latest version with new UI."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
