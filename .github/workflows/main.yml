name: Android APK Build and Cross-Repo Update

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Current Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Get Version Code
        id: get_version
        run: |
          VCODE=$(date +%s)
          echo "VCODE=$VCODE" >> $GITHUB_ENV

      - name: Create Release in Current Repo
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VCODE }}
          name: Shamim Live TV v2.1 (Build ${{ env.VCODE }})
          files: app/build/outputs/apk/debug/app-debug.apk
          body: "Automatic build of the latest version."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push update.json to Shamim-Live-TV-Update Repo
        env:
          MY_PAT: ${{ secrets.MY_PAT }} # This needs to be added to your GitHub Secrets
        run: |
          git clone https://x-access-token:${MY_PAT}@github.com/shamimpipon/Shamim-Live-TV-Update.git update_repo
          cd update_repo
          echo '{
            "versionCode": '${{ env.VCODE }}',
            "apkUrl": "https://github.com/shamimpipon/Shamim-live-tv/releases/download/v${{ env.VCODE }}/app-debug.apk",
            "whatsNew": "New Premium UI and Auto-Update system."
          }' > update.json
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add update.json
          git commit -m "Update version to ${{ env.VCODE }}"
          git push
